name: Continuous Deployment - PFA Frontend (S3)

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    name: Build Frontend & Deploy via S3
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies & Build Bundle
      run: |
        npm ci
        npm run build # Generates the /dist folder

    - name: Package Build Artifact
      run: |
        tar -czvf frontend-build.tar.gz -C dist .

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Upload Artifact to S3
      run: |
        aws s3 cp frontend-build.tar.gz s3://${{ secrets.S3_BUCKET_NAME }}/builds/frontend-build.tar.gz

    - name: SSH Deploy to EC2 Instance
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          # Ensure AWS CLI is available on EC2
          if ! command -v aws &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y awscli
          fi

          # Ensure target web directory exists
          sudo mkdir -p /var/www/pfa-frontend

          # Download the latest build tarball from S3
          aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/builds/frontend-build.tar.gz /tmp/frontend-build.tar.gz --region ${{ secrets.AWS_REGION }}

          # Extract to web root and clean up tarball
          sudo tar -xzvf /tmp/frontend-build.tar.gz -C /var/www/pfa-frontend/
          rm -f /tmp/frontend-build.tar.gz

          # Reload NGINX to serve updated assets instantly
          sudo systemctl reload nginx || sudo systemctl restart nginx